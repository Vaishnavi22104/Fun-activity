<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDG Cloud Nagpur - Projector</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { grotesk: ['Space Grotesk', 'sans-serif'], outfit: ['Outfit', 'sans-serif'] } } } }
    </script>
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'Space Grotesk','Outfit',sans-serif;overflow:hidden;background:#FFF8F0;}

        /* Neo Brutal Grid Background */
        .brutal-bg{
            background-color:#FFF8F0;
            background-image:
                linear-gradient(rgba(26,26,26,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(26,26,26,0.04) 1px, transparent 1px);
            background-size:40px 40px;
        }

        #bubble-canvas{position:absolute;inset:0;width:100%;height:100%;overflow:hidden;z-index:10;}

        /* 3D Sphere Bubble */
        .bubble{
            position:absolute;
            font-family:'Space Grotesk','Outfit',sans-serif;
            font-weight:700;
            white-space:nowrap;
            border-radius:50%;
            aspect-ratio:1;
            display:flex;align-items:center;justify-content:center;
            pointer-events:none;
            will-change:transform,opacity;
            border:3px solid #1a1a1a;
            box-shadow:4px 4px 0 #1a1a1a;
            transition:opacity 0.4s ease;
            overflow:hidden;
        }
        /* Specular highlight */
        .bubble::before{
            content:'';position:absolute;
            top:10%;left:15%;
            width:30%;height:24%;
            background:radial-gradient(ellipse,rgba(255,255,255,0.75) 0%,transparent 70%);
            border-radius:50%;pointer-events:none;
        }

        .bubble.no-transition{transition:none !important;}

        .winner-overlay{
            position:fixed;inset:0;z-index:40;
            background:rgba(255,248,240,0.97);
            backdrop-filter:blur(12px);
            display:flex;flex-direction:column;
            align-items:center;justify-content:center;
            opacity:0;transition:opacity 0.6s ease;pointer-events:none;
        }
        .winner-overlay.visible{opacity:1;pointer-events:auto;}

        @keyframes cardReveal{
            0%{opacity:0;transform:translateY(24px) scale(0.92);}
            70%{transform:translateY(-3px) scale(1.02);}
            100%{opacity:1;transform:translateY(0) scale(1);}
        }
        .winner-card{
            opacity:0;
            animation:cardReveal 0.45s cubic-bezier(0.34,1.56,0.64,1) forwards;
            font-family:'Space Grotesk','Outfit',sans-serif;font-weight:700;
            border:3px solid #1a1a1a;
            border-radius:14px;
            box-shadow:4px 4px 0 #1a1a1a;
            color:#1a1a1a;
        }

        /* Element Animations */
        .animate-float { animation: floatAnim 6s ease-in-out infinite; }
        .animate-float-slow { animation: floatAnim 8s ease-in-out infinite reverse; }
        @keyframes floatAnim {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
        }
        
        #popcorn-mascot { transition: all 0.3s ease; }
        #popcorn-mascot.excited {
            animation: waveAnim 0.5s ease-in-out infinite alternate;
            filter: drop-shadow(0 0 40px rgba(66, 133, 244, 0.6));
        }
        #popcorn-mascot.revealed {
            animation: jumpAnim 1.2s ease-in-out infinite;
        }
        @keyframes waveAnim {
            0% { transform: translateY(0) rotate(-10deg) scale(1.1); }
            100% { transform: translateY(0) rotate(10deg) scale(1.1); }
        }
        @keyframes jumpAnim {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.05); }
        }

        /* Squash-stretch on bounce */
        @keyframes squashX{
            0%{transform:translate(-50%,-50%) scaleX(0.85) scaleY(1.12);}
            100%{transform:translate(-50%,-50%) scaleX(1) scaleY(1);}
        }
        @keyframes squashY{
            0%{transform:translate(-50%,-50%) scaleX(1.12) scaleY(0.85);}
            100%{transform:translate(-50%,-50%) scaleX(1) scaleY(1);}
        }
    </style>
</head>
<body class="brutal-bg">

    <!-- Neo Brutal Header -->
    <header class="fixed top-0 left-0 right-0 z-30 flex items-center justify-between px-6 md:px-8 py-3 bg-[#FFF8F0] border-b-[3px] border-[#1a1a1a]">
        <img src="ASSETS/transparentGDG.png" alt="GDG Cloud Nagpur" class="h-12 md:h-16 object-contain">
        <div class="flex items-center gap-3 bg-[#4285F4] px-5 py-2.5 rounded-xl border-[3px] border-[#1a1a1a] shadow-[4px_4px_0_#1a1a1a]">
            <span class="text-lg md:text-xl font-bold text-white">Joined</span>
            <span id="live-count" class="text-2xl md:text-3xl font-black text-white">0</span>
        </div>
    </header>

    <div id="bubble-canvas" class="fixed inset-0"></div>

    <div id="winner-overlay" class="winner-overlay">
        <h1 id="overlay-title" class="font-black text-[#1a1a1a] text-center mb-8">🎉 Congratulations! 🎉</h1>
        <div id="winners-grid" class="flex flex-wrap justify-center items-center max-w-[92vw] max-h-[70vh]"></div>
    </div>

    <!-- Elements -->
    <img src="ASSETS/element3.png" class="fixed -bottom-4 -left-4 w-[8rem] md:w-[11rem] z-0 pointer-events-none drop-shadow-2xl animate-float-slow opacity-90" alt="Spark Android">
    <img src="ASSETS/element2.png" id="popcorn-mascot" class="fixed top-24 right-4 md:top-32 md:right-8 w-[7.5rem] md:w-[10rem] z-0 pointer-events-none drop-shadow-2xl animate-float" alt="Popcorn Android">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const app = initializeApp({
            apiKey: "AIzaSyDh9kYjMmSigd0q1leHcVcR8i3A0S7XTlo",
            authDomain: "gdg-cloud-activity-49511.firebaseapp.com",
            databaseURL: "https://gdg-cloud-activity-49511-default-rtdb.firebaseio.com",
            projectId: "gdg-cloud-activity-49511",
            storageBucket: "gdg-cloud-activity-49511.firebasestorage.app",
            messagingSenderId: "332553451525",
            appId: "1:332553451525:web:3cc286d13e38483e72c46c"
        });
        const db = getDatabase(app);
        const attendeesRef = ref(db, 'attendees');
        const stateRef = ref(db, 'eventState');

        const $canvas = document.getElementById('bubble-canvas');
        const $overlay = document.getElementById('winner-overlay');
        const $grid = document.getElementById('winners-grid');
        const $count = document.getElementById('live-count');
        const $title = document.getElementById('overlay-title');
        const $popcorn = document.getElementById('popcorn-mascot');

        // ── Google Brand Palette for 3D Spheres ──
        const BUBBLE_PALETTE = [
            '#A2C2F8', // Light Google Blue
            '#F5A8A0', // Light Google Red
            '#FDE293', // Light Google Yellow
            '#A8DAB5', // Light Google Green
            '#D7AEFB', // Light Google Purple
            '#FFCC80', // Light Google Orange
            '#80CBC4', // Light Google Teal
            '#F48FB1', // Light Google Pink
            '#80DEEA', // Light Google Cyan
            '#FFAB91', // Light Google Deep Orange
            '#9FA8DA'  // Light Google Indigo
        ];
        const CARD_COLORS = ['#4285F4','#EA4335','#FBBC04','#34A853'];

        let bubbles = [];
        let W = window.innerWidth, H = window.innerHeight;
        let phase = 'waiting';
        let rouletteTimer = null;
        let winnerIds = new Set();
        const HEADER = 80;

        window.addEventListener('resize', () => { W = window.innerWidth; H = window.innerHeight; });

        // Helper: Generate 3D sphere gradient
        function sphereGradient(color) {
            return `radial-gradient(circle at 35% 30%, rgba(255,255,255,0.6) 0%, ${color} 50%, color-mix(in srgb, ${color} 75%, #1a1a1a) 100%)`;
        }

        // ── Attendees ──
        onValue(attendeesRef, snap => {
            const data = snap.val();
            if (!data) { bubbles.forEach(b => b.el.remove()); bubbles = []; $count.textContent = '0'; return; }
            const list = Object.entries(data)
                .map(([k, v]) => ({ id: k, ...v }))
                .sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
            $count.textContent = list.length;

            const n = list.length;
            // Sphere size: adapts to crowd, scales down to 25px for 100+ attendees
            const baseSize = Math.max(25, Math.min(100, 450 / Math.sqrt(n + 1)));

            const incoming = new Set(list.map(a => a.id));
            bubbles = bubbles.filter(b => { if (!incoming.has(b.id)) { b.el.remove(); return false; } return true; });
            const existing = new Set(bubbles.map(b => b.id));

            list.forEach((a, index) => {
                const regNumber = index + 1;
                let b = bubbles.find(x => x.id === a.id);
                if (!b) {
                    const color = BUBBLE_PALETTE[Math.floor(Math.random() * BUBBLE_PALETTE.length)];
                    const el = document.createElement('div');
                    el.className = 'bubble';
                    $canvas.appendChild(el);
                    b = {
                        id: a.id, name: a.name,
                        x: Math.random() * W * 0.7 + W * 0.15,
                        y: H + 70,
                        vx: (Math.random() - 0.5) * 1.8,
                        vy: -(Math.random() * 1.8 + 1.0),
                        size: baseSize, color, el,
                        r: 0, // computed after styling
                        squashTimer: 0, squashAxis: ''
                    };
                    bubbles.push(b);
                }
                b.size = baseSize;
                b.regNumber = regNumber;
                b.el.textContent = regNumber;
            });

            bubbles.forEach(b => {
                styleBubble(b);
                const rect = b.el.getBoundingClientRect();
                b.r = rect.width / 2 + 4;
            });
        });

        function styleBubble(b) {
            const diam = b.size;
            const fs = Math.max(9, Math.min(24, diam * 0.35));
            b.el.style.width = `${diam}px`;
            b.el.style.height = `${diam}px`;
            b.el.style.fontSize = `${fs}px`;
            b.el.style.background = sphereGradient(b.color);
            b.el.style.color = '#1a1a1a';
            b.el.style.textShadow = 'none';
            b.el.style.border = '3px solid #1a1a1a';
            b.el.style.boxShadow = '4px 4px 0 #1a1a1a';
            b.el.style.padding = '2px';
            b.el.style.lineHeight = '1';
            b.el.style.textAlign = 'center';
            b.el.style.wordBreak = 'keep-all';
            b.el.style.whiteSpace = 'nowrap';
        }

        function resetBubbleStyle(b) {
            styleBubble(b);
        }

        function highlightBubble(b) {
            const diam = b.size;
            b.el.style.width = `${diam}px`;
            b.el.style.height = `${diam}px`;
            b.el.style.background = sphereGradient(b.color);
            b.el.style.color = '#1a1a1a';
            b.el.style.border = '3px solid #1a1a1a';
            b.el.style.boxShadow = `6px 6px 0 #1a1a1a, 0 0 20px 6px ${b.color}99, 0 0 40px 12px ${b.color}66`;
        }

        // ── Event State ──
        onValue(stateRef, snap => {
            const state = snap.val();
            if (!state || state.phase === 'waiting') handleWaiting();
            else if (state.phase === 'highlight_roulette') handleRoulette();
            else if (state.phase === 'winners_revealed') handleReveal(state.list || []);
        });

        function handleWaiting() {
            phase = 'waiting';
            winnerIds.clear();
            if (rouletteTimer) { clearInterval(rouletteTimer); rouletteTimer = null; }
            $overlay.classList.remove('visible');
            $canvas.style.opacity = '1';
            $canvas.style.transition = 'opacity 0.6s ease';
            bubbles.forEach(b => {
                b.el.classList.remove('no-transition');
                resetBubbleStyle(b);
                b.el.style.opacity = '1';
            });
            $popcorn.className = 'fixed top-24 right-4 md:top-32 md:right-8 w-[7.5rem] md:w-[10rem] z-0 pointer-events-none drop-shadow-2xl animate-float';
        }

        function handleRoulette() {
            phase = 'roulette';
            if (rouletteTimer) clearInterval(rouletteTimer);
            $popcorn.classList.add('excited');
            bubbles.forEach(b => b.el.classList.add('no-transition'));
            rouletteTimer = setInterval(() => {
                bubbles.forEach(b => resetBubbleStyle(b));
                const count = Math.max(2, Math.floor(bubbles.length * 0.25));
                const shuffled = [...Array(bubbles.length).keys()].sort(() => Math.random() - 0.5);
                for (let i = 0; i < count; i++) {
                    highlightBubble(bubbles[shuffled[i]]);
                }
            }, 100);
        }

        function handleReveal(winners) {
            phase = 'revealed';
            if (rouletteTimer) { clearInterval(rouletteTimer); rouletteTimer = null; }
            winnerIds = new Set(winners.map(w => w.id));
            $popcorn.classList.remove('excited');
            $popcorn.classList.add('revealed');
            bubbles.forEach(b => b.el.classList.remove('no-transition'));
            requestAnimationFrame(() => {
                bubbles.forEach(b => {
                    if (winnerIds.has(b.id)) {
                        highlightBubble(b);
                        b.el.style.opacity = '1';
                    } else {
                        resetBubbleStyle(b);
                        b.el.style.opacity = '0.08';
                        b.el.style.boxShadow = 'none';
                    }
                });
            });

            setTimeout(() => {
                $canvas.style.transition = 'opacity 0.8s ease';
                $canvas.style.opacity = '0';
                setTimeout(() => {
                    $grid.innerHTML = '';
                    const vw = W, vh = H;
                    const fs = Math.min(vw / 20, vh / 14, 52);
                    const padV = Math.max(10, fs * 0.4);
                    const padH = Math.max(20, fs * 0.9);
                    const gap = Math.max(10, fs * 0.3);
                    $title.style.fontSize = `${Math.min(vw / 14, vh / 10, 68)}px`;
                    $grid.style.gap = `${gap}px`;

                    $overlay.classList.add('visible');

                    winners.forEach((w, i) => {
                        setTimeout(() => {
                            const card = document.createElement('div');
                            card.className = 'winner-card';
                            const c = CARD_COLORS[i % 4];
                            card.style.background = c;
                            card.style.color = '#fff';
                            card.style.padding = `${padV}px ${padH}px`;
                            card.style.fontSize = `${fs}px`;
                            card.style.textShadow = '0 2px 4px rgba(0,0,0,0.2)';
                            card.textContent = w.name;
                            $grid.appendChild(card);
                            confetti({ particleCount: 50, spread: 65, origin: { y: 0.6 }, colors: [c, '#fff'] });
                        }, i * 320);
                    });

                    setTimeout(() => {
                        const end = Date.now() + 3000;
                        (function burst() {
                            confetti({ particleCount: 5, angle: 60, spread: 55, origin: { x: 0 }, colors: CARD_COLORS });
                            confetti({ particleCount: 5, angle: 120, spread: 55, origin: { x: 1 }, colors: CARD_COLORS });
                            if (Date.now() < end) requestAnimationFrame(burst);
                        })();
                    }, winners.length * 320 + 500);
                }, 400);
            }, 3000);
        }

        // ══ PHYSICS with Smooth Bouncing ══
        function tick() {
            bubbles.forEach(b => {
                if (phase === 'waiting' || phase === 'roulette') {
                    b.vx += (Math.random() - 0.5) * 0.06;
                    b.vy += (Math.random() - 0.5) * 0.06;

                    // Gentle gravity towards center
                    const cx = W / 2;
                    const cy = HEADER + (H - HEADER) / 2;
                    b.vx += (cx - b.x) * 0.0001;
                    b.vy += (cy - b.y) * 0.0001;
                }
                b.vx *= 0.993; b.vy *= 0.993;
                if (phase === 'revealed' && winnerIds.has(b.id)) {
                    b.vx += (W / 2 - b.x) * 0.0004;
                    b.vy += (H / 2 - b.y) * 0.0004;
                }
                b.x += b.vx; b.y += b.vy;
            });

            // Wall collisions with squash-stretch
            bubbles.forEach(b => {
                const m = b.r + 6;
                let bounced = false;
                let axis = '';
                if (b.x < m) { b.x = m; b.vx = Math.abs(b.vx) * 0.75; bounced = true; axis = 'x'; }
                if (b.x > W - m) { b.x = W - m; b.vx = -Math.abs(b.vx) * 0.75; bounced = true; axis = 'x'; }
                if (b.y < HEADER + m) { b.y = HEADER + m; b.vy = Math.abs(b.vy) * 0.75; bounced = true; axis = 'y'; }
                if (b.y > H - m) { b.y = H - m; b.vy = -Math.abs(b.vy) * 0.75; bounced = true; axis = 'y'; }

                if (bounced && Math.abs(axis === 'x' ? b.vx : b.vy) > 0.5) {
                    b.squashTimer = 12;
                    b.squashAxis = axis;
                }
            });

            // Inter-bubble collisions
            for (let iter = 0; iter < 3; iter++) {
                for (let i = 0; i < bubbles.length; i++) {
                    for (let j = i + 1; j < bubbles.length; j++) {
                        const a = bubbles[i], b = bubbles[j];
                        const dx = b.x - a.x, dy = b.y - a.y;
                        const minDist = a.r + b.r + 4;
                        const distSq = dx * dx + dy * dy;
                        if (distSq < minDist * minDist && distSq > 0.01) {
                            const dist = Math.sqrt(distSq);
                            const nx = dx / dist, ny = dy / dist;
                            const overlap = minDist - dist;
                            a.x -= nx * overlap * 0.52; a.y -= ny * overlap * 0.52;
                            b.x += nx * overlap * 0.52; b.y += ny * overlap * 0.52;
                            const dvx = a.vx - b.vx, dvy = a.vy - b.vy;
                            const dot = dvx * nx + dvy * ny;
                            if (dot > 0) {
                                a.vx -= nx * dot * 0.5; a.vy -= ny * dot * 0.5;
                                b.vx += nx * dot * 0.5; b.vy += ny * dot * 0.5;
                                a.vx -= nx * 0.15; a.vy -= ny * 0.15;
                                b.vx += nx * 0.15; b.vy += ny * 0.15;
                            }
                            // Trigger squash on both
                            if (Math.abs(dot) > 0.8) {
                                a.squashTimer = 8; a.squashAxis = Math.abs(nx) > Math.abs(ny) ? 'x' : 'y';
                                b.squashTimer = 8; b.squashAxis = Math.abs(nx) > Math.abs(ny) ? 'x' : 'y';
                            }
                        }
                    }
                }
            }

            // Render with squash-stretch
            bubbles.forEach(b => {
                let scaleX = 1, scaleY = 1;
                if (phase === 'revealed') {
                    const base = winnerIds.has(b.id) ? 1.3 : 0.6;
                    scaleX = base; scaleY = base;
                }

                if (b.squashTimer > 0) {
                    const t = b.squashTimer / 12;
                    const squash = 1 + t * 0.15;
                    const stretch = 1 - t * 0.1;
                    if (b.squashAxis === 'x') { scaleX *= stretch; scaleY *= squash; }
                    else { scaleX *= squash; scaleY *= stretch; }
                    b.squashTimer--;
                }

                b.el.style.transform = `translate3d(${b.x}px, ${b.y}px, 0) translate(-50%, -50%) scaleX(${scaleX}) scaleY(${scaleY})`;
            });

            requestAnimationFrame(tick);
        }
        tick();
</script>

<div class="fixed bottom-3 right-3 sm:bottom-5 sm:right-5 z-[100] flex items-center gap-2 px-3 py-1.5 sm:px-4 sm:py-2 rounded-xl bg-[#FFF8F0] border-[3px] border-[#1a1a1a] shadow-[3px_3px_0_#1a1a1a] text-xs sm:text-sm font-bold text-[#1a1a1a] cursor-default">
    <span class="text-gray-500">Made with</span>
    <img src="ASSETS/Google_Antigravity_Logo.svg.png" class="h-4 sm:h-5 object-contain" alt="Google Antigravity">
</div>

</body>
