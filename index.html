<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GDG Cloud Nagpur - Event</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { grotesk: ['Space Grotesk', 'sans-serif'], outfit: ['Outfit', 'sans-serif'] } } } }
    </script>
    <style>
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        html{scroll-behavior:smooth;}
        body{font-family:'Space Grotesk','Outfit',sans-serif;overflow-x:hidden;background:#FFF8F0;}

        /* Neo Brutal Grid Background */
        .brutal-bg{
            background-color:#FFF8F0;
            background-image:
                linear-gradient(rgba(26,26,26,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(26,26,26,0.04) 1px, transparent 1px);
            background-size:40px 40px;
        }

        #bubble-canvas{position:absolute;inset:0;width:100%;height:100%;overflow:hidden;}

        /* 3D Sphere Bubble */
        .bubble{
            position:absolute;
            font-family:'Space Grotesk','Outfit',sans-serif;
            font-weight:700;
            white-space:nowrap;
            border-radius:50%;
            aspect-ratio:1;
            display:flex;align-items:center;justify-content:center;
            pointer-events:none;
            will-change:transform,opacity;
            border:3px solid #1a1a1a;
            box-shadow:4px 4px 0 #1a1a1a;
            transition:opacity 0.4s ease;
            overflow:hidden;
        }
        .bubble::before{
            content:'';position:absolute;
            top:10%;left:15%;
            width:30%;height:24%;
            background:radial-gradient(ellipse,rgba(255,255,255,0.75) 0%,transparent 70%);
            border-radius:50%;pointer-events:none;
        }
        .bubble.no-transition{transition:none !important;}

        .winner-overlay{
            position:fixed;inset:0;z-index:40;
            background:rgba(255,248,240,0.97);
            backdrop-filter:blur(12px);
            display:flex;flex-direction:column;
            align-items:center;justify-content:center;
            opacity:0;transition:opacity 0.6s ease;pointer-events:none;
        }
        .winner-overlay.visible{opacity:1;pointer-events:auto;}

        @keyframes cardReveal{
            0%{opacity:0;transform:translateY(24px) scale(0.92);}
            70%{transform:translateY(-3px) scale(1.02);}
            100%{opacity:1;transform:translateY(0) scale(1);}
        }
        .winner-card{
            opacity:0;
            animation:cardReveal 0.45s cubic-bezier(0.34,1.56,0.64,1) forwards;
            font-family:'Space Grotesk','Outfit',sans-serif;font-weight:700;
            border:3px solid #1a1a1a;
            border-radius:14px;
            box-shadow:4px 4px 0 #1a1a1a;
        }

        /* Element Animations */
        .animate-float { animation: floatAnim 6s ease-in-out infinite; }
        @keyframes floatAnim {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
        }

        #live-mascot { transition: all 0.3s ease; }
        #live-mascot.excited {
            animation: waveAnim 0.5s ease-in-out infinite alternate;
            filter: drop-shadow(0 0 40px rgba(66, 133, 244, 0.6));
        }
        #live-mascot.revealed {
            animation: jumpAnim 1.2s ease-in-out infinite;
        }
        @keyframes waveAnim {
            0% { transform: translateY(0) rotate(-10deg) scale(1.1); }
            100% { transform: translateY(0) rotate(10deg) scale(1.1); }
        }
        @keyframes jumpAnim {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.05); }
        }

        @keyframes drawCheck{to{stroke-dashoffset:0;}}
        @keyframes scaleCircle{0%{transform:scale(0);opacity:0;}60%{transform:scale(1.1);}100%{transform:scale(1);opacity:1;}}
        .check-circle{animation:scaleCircle 0.5s ease forwards;}
        .check-mark{stroke-dasharray:50;stroke-dashoffset:50;animation:drawCheck 0.4s 0.35s ease forwards;}

        /* Password modal */
        .modal-backdrop{
            position:fixed;inset:0;z-index:50;
            background:rgba(0,0,0,0.4);backdrop-filter:blur(6px);
            display:flex;align-items:center;justify-content:center;
            opacity:0;pointer-events:none;
            transition:opacity 0.3s ease;
        }
        .modal-backdrop.visible{opacity:1;pointer-events:auto;}

        /* Neo Brutal button press effect */
        .brutal-btn {
            border: 3px solid #1a1a1a;
            box-shadow: 4px 4px 0 #1a1a1a;
            transition: all 0.1s ease;
        }
        .brutal-btn:hover {
            transform: translate(-1px, -1px);
            box-shadow: 5px 5px 0 #1a1a1a;
        }
        .brutal-btn:active {
            transform: translate(3px, 3px);
            box-shadow: 0px 0px 0 #1a1a1a;
        }
    </style>
</head>
<body>

<!-- ═══ SCREEN 1: HERO + JOIN ═══ -->
<div id="screen-join" class="brutal-bg">
    <!-- Hero: Big Logo -->
    <section class="h-screen flex flex-col items-center justify-center relative px-6 overflow-hidden">
        <img src="ASSETS/element1.png" class="absolute bottom-0 left-1/2 -translate-x-1/2 w-80 md:w-[36rem] lg:w-[42rem] opacity-70 z-0 pointer-events-none drop-shadow-xl" alt="Cursor Android">
        <div class="bg-white rounded-[1.2rem] border-[3px] border-[#1a1a1a] shadow-[6px_6px_0_#1a1a1a] p-5 sm:p-8 md:p-14 relative z-10 w-full max-w-[21rem] sm:max-w-[26rem] md:max-w-[40rem] mb-48 md:mb-20">
            <img src="ASSETS/transparentGDG.png" alt="GDG Cloud Nagpur" class="w-full object-contain">
        </div>
        <a href="#join-section" class="absolute bottom-36 md:bottom-10 animate-bounce text-[#1a1a1a] hover:text-black flex flex-col items-center gap-2 transition-colors">
            <span class="text-xs font-black tracking-widest uppercase bg-[#FBBC04] border-[3px] border-[#1a1a1a] shadow-[3px_3px_0_#1a1a1a] px-4 py-1.5 rounded-xl">Scroll Down</span>
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.8" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path></svg>
        </a>
    </section>

    <!-- Join Section -->
    <section id="join-section" class="min-h-screen flex flex-col items-center justify-center px-6 py-20 relative overflow-hidden">
        <h1 class="text-4xl md:text-6xl font-black text-[#1a1a1a] mb-8 text-center relative z-10">
            Join the <span class="text-[#4285F4]">Cloud</span> <span class="text-[#EA4335]">V</span><span class="text-[#FBBC04]">i</span><span class="text-[#34A853]">b</span><span class="text-[#4285F4]">e</span>
        </h1>
        <div class="w-full max-w-md bg-white rounded-[1.2rem] border-[3px] border-[#1a1a1a] shadow-[6px_6px_0_#1a1a1a] p-8 relative z-10">
            <input id="inp-name" type="text" placeholder="Your full name" autocomplete="off"
                   class="w-full text-xl md:text-2xl font-semibold text-center px-5 py-4 rounded-xl bg-[#FFF8F0] border-[3px] border-[#1a1a1a] focus:border-[#4285F4] focus:shadow-[4px_4px_0_#4285F4] outline-none transition-all mb-5 placeholder-gray-400">
            <button id="btn-join"
                    class="brutal-btn w-full text-xl md:text-2xl font-black text-white py-4 rounded-xl bg-[#4285F4]">
                Join Now 🚀
            </button>
            <p id="msg-error" class="text-[#EA4335] text-center font-bold mt-4 hidden">Please enter your name!</p>
        </div>

        <!-- Admin Entry Button -->
        <button id="btn-admin-gate" class="brutal-btn mt-10 px-6 py-3 text-sm font-bold text-[#1a1a1a] bg-white rounded-xl flex items-center gap-2 relative z-10">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
            🔒 Event Manager
        </button>

        <!-- Element 1 at the bottom -->
        <img src="ASSETS/element1.png" class="absolute bottom-0 left-1/2 -translate-x-1/2 w-80 md:w-[36rem] lg:w-[42rem] opacity-70 z-0 pointer-events-none drop-shadow-xl" alt="Cursor Android">
    </section>
</div>

<!-- ═══ SCREEN 2: SUCCESS ═══ -->
<div id="screen-tick" class="hidden fixed inset-0 z-50 bg-[#FFF8F0] flex flex-col items-center justify-center px-6">
    <div class="bg-[#34A853] w-36 h-36 rounded-[1.2rem] border-[3px] border-[#1a1a1a] shadow-[6px_6px_0_#1a1a1a] flex items-center justify-center mb-6">
        <svg class="w-20 h-20" viewBox="0 0 100 100">
            <path class="check-mark" d="M25 52 L42 68 L75 32" fill="none" stroke="#fff" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </div>
    <p class="text-4xl font-black text-[#1a1a1a] mb-5">You're In!</p>
    
    <!-- Registration Number Bubble -->
    <div id="your-number-badge" class="mb-8 px-8 py-4 bg-[#FBBC04] rounded-2xl border-[3px] border-[#1a1a1a] shadow-[4px_4px_0_#1a1a1a] text-center">
        <span class="text-xs font-bold text-[#1a1a1a]/80 uppercase tracking-widest block mb-1">Your Bubble Number</span>
        <span id="your-number" class="text-5xl font-black text-[#1a1a1a]">#--</span>
    </div>

    <p class="text-lg text-gray-600 font-bold text-center">Look at the big screen 🎉</p>
</div>

<!-- ═══ PASSWORD MODAL ═══ -->
<div id="modal-password" class="modal-backdrop">
    <div class="bg-white rounded-[1.2rem] border-[3px] border-[#1a1a1a] shadow-[6px_6px_0_#1a1a1a] p-8 w-full max-w-sm mx-4">
        <div class="flex items-center justify-between mb-6">
            <h2 class="text-2xl font-black text-[#1a1a1a]">🔐 Host Login</h2>
            <button id="btn-modal-close" class="w-10 h-10 flex items-center justify-center rounded-xl border-[3px] border-[#1a1a1a] shadow-[2px_2px_0_#1a1a1a] hover:shadow-[0_0_0_#1a1a1a] hover:translate-x-[2px] hover:translate-y-[2px] bg-white text-[#1a1a1a] transition-all text-xl font-bold">✕</button>
        </div>
        <input id="inp-password" type="password" placeholder="Enter password"
               class="w-full text-lg font-semibold text-center px-5 py-4 rounded-xl bg-[#FFF8F0] border-[3px] border-[#1a1a1a] focus:border-[#4285F4] focus:shadow-[4px_4px_0_#4285F4] outline-none transition-all mb-4 placeholder-gray-400">
        <p id="msg-wrong-pw" class="text-[#EA4335] text-center font-bold mb-4 hidden">Wrong password!</p>
        <button id="btn-pw-submit"
                class="brutal-btn w-full text-lg font-black text-white py-4 rounded-xl bg-[#4285F4]">
            Unlock
        </button>
    </div>
</div>

<!-- ═══ FIREBASE + SCRIPT ═══ -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, push, serverTimestamp, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const app = initializeApp({
        apiKey: "AIzaSyDh9kYjMmSigd0q1leHcVcR8i3A0S7XTlo",
        authDomain: "gdg-cloud-activity-49511.firebaseapp.com",
        databaseURL: "https://gdg-cloud-activity-49511-default-rtdb.firebaseio.com",
        projectId: "gdg-cloud-activity-49511",
        storageBucket: "gdg-cloud-activity-49511.firebasestorage.app",
        messagingSenderId: "332553451525",
        appId: "1:332553451525:web:3cc286d13e38483e72c46c"
    });
    const db = getDatabase(app);
    const attendeesRef = ref(db, 'attendees');

    const $ = id => document.getElementById(id);

    // ════════════════════════════
    //  PASSWORD → REDIRECT TO host.html
    // ════════════════════════════
    const HOST_PASSWORD = 'gdgcloud';

    $('btn-admin-gate').addEventListener('click', () => {
        $('modal-password').classList.add('visible');
        $('inp-password').focus();
    });

    $('btn-modal-close').addEventListener('click', () => {
        $('modal-password').classList.remove('visible');
        $('msg-wrong-pw').classList.add('hidden');
        $('inp-password').value = '';
    });

    $('inp-password').addEventListener('keydown', e => { if (e.key === 'Enter') checkPassword(); });
    $('btn-pw-submit').addEventListener('click', checkPassword);

    function checkPassword() {
        if ($('inp-password').value === HOST_PASSWORD) {
            window.location.href = 'host.html';
        } else {
            $('msg-wrong-pw').classList.remove('hidden');
            $('inp-password').value = '';
            $('inp-password').focus();
        }
    }

    // ════════════════════════════
    //  ATTENDEE JOIN FLOW
    // ════════════════════════════
    $('btn-join').addEventListener('click', doJoin);
    $('inp-name').addEventListener('keydown', e => { if (e.key === 'Enter') doJoin(); });

    async function doJoin() {
        const name = $('inp-name').value.trim();
        if (!name) { $('msg-error').classList.remove('hidden'); return; }
        $('msg-error').classList.add('hidden');
        $('btn-join').disabled = true; $('btn-join').textContent = 'Joining…';

        try {
            const newRef = await push(attendeesRef, { name, timestamp: serverTimestamp() });
            const myId = newRef.key;

            // Fetch the updated attendees list to calculate our chronological registration number
            const snap = await get(attendeesRef);
            const data = snap.val() || {};
            const keys = Object.keys(data).sort();
            const myIndex = keys.indexOf(myId);
            const regNumber = myIndex !== -1 ? (myIndex + 1) : keys.length;

            $('your-number').textContent = regNumber;

            $('screen-join').classList.add('hidden');
            $('screen-tick').classList.remove('hidden'); $('screen-tick').classList.add('flex');
        } catch (err) {
            alert('Could not join.');
            $('btn-join').disabled = false; $('btn-join').textContent = 'Join Now 🚀';
        }
    }
</script>

<div class="fixed bottom-3 right-3 sm:bottom-5 sm:right-5 z-[100] flex items-center gap-2 px-3 py-1.5 sm:px-4 sm:py-2 rounded-xl bg-[#FFF8F0] border-[3px] border-[#1a1a1a] shadow-[3px_3px_0_#1a1a1a] text-xs sm:text-sm font-bold text-[#1a1a1a] cursor-default">
    <span class="text-gray-500">Made with</span>
    <img src="ASSETS/Google_Antigravity_Logo.svg.png" class="h-4 sm:h-5 object-contain" alt="Google Antigravity">
</div>

</body>
</html>
